<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

	

		


	</style>
</head>

<body>
	<h1 id="header-title">
		Gayoung Kim
	</h1>

	<svg id="visualization-activity">
		<!-- YOUR SVG CODE WILL GO HERE -->
		<line x1="30" y1="450" x2="650" y2="450" class="axis-line" />

        <g class="bar-with-count" transform="translate(50, 0)">
            <rect x="25" y="86" width="50" height="364" class="bar" />
            <text x="25" y="470" class="station-name">홍대입구</text>
            <text x="25" y="76" class="station-name">72,874</text>
        </g>

        <g class="bar-with-count" transform="translate(150, 0)">
            <rect x="0" y="135" width="50" height="315" class="bar" />
            <text x="0" y="470" class="station-name">잠실</text>
            <text x="0" y="125" class="station-name">63,085</text>
        </g>

        <g class="bar-with-count" transform="translate(250, 0)">
            <rect x="0" y="182" width="50" height="268" class="bar" />
            <text x="0" y="470" class="station-name">고속터미널</text>
            <text x="0" y="172" class="station-name">53,566</text>
        </g>

        <g class="bar-with-count" transform="translate(350, 0)">

        <g class="bar-with-count" transform="translate(450, 0)">

        </g>

        <g class="bar-with-count" transform="translate(550, 0)">

        </g>


	</svg>

</body>
</html>
